<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<canvas id="chart"></canvas>

<script>

fetch("/chart-data")
.then(res => res.json())
.then(data => {

new Chart(document.getElementById("chart"), {
type: "pie",
data: {
labels: ["Fake", "Real"],
datasets: [{
data: [data.fake, data.real],
backgroundColor: ["red", "green"]
}]
}
});

});

</script>
